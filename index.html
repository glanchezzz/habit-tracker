<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Habit Tracker</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
:--bg{ --bg: #080A0F; --sur: #10131A; --s2: #171B25; --brd: #1E2235; --txt: #DDE1EF; --mut: #4A4E65; --acc: #8FA3D8; --suc: #6BA38A; --dan: #C0534A; --wrn: #C4A26A; }
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--s2);border-radius:4px;}
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:230px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{padding:22px 36px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:22px 36px 60px;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;align-items:center;justify-content:center;}
#login-screen.show{display:flex;}
.dialog{background:var(--sur);border:1px solid var(--brd);border-radius:20px;padding:26px 26px 30px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.7);animation:scaleIn .18s ease;}
input,select,button,textarea{font-family:inherit;}
input,select{background:var(--s2);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--txt);outline:none;width:100%;display:block;}
input::placeholder{color:var(--mut);}
textarea{background:var(--s2);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--txt);outline:none;width:100%;display:block;resize:vertical;}
.btn{cursor:pointer;outline:none;border:none;border-radius:10px;font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--acc);color:#080A0F;font-weight:700;padding:12px 22px;font-size:15px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:16px;overflow:hidden;}
.form-label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;display:block;}
.form-group{margin-bottom:18px;}
.dlg-title{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;}
.close-btn{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;border-radius:6px;transition:color .15s;}
.close-btn:hover{color:var(--txt);}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="login-screen">
  <div style="text-align:center;max-width:380px;padding:40px 28px">
    <div style="font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px">Habit Tracker</div>
    <div style="font-size:14px;color:var(--mut);line-height:1.6;margin-bottom:32px">Sign in with Google to sync habits</div>
    <button class="btn btn-primary" id="google-signin-btn" style="width:100%;margin-bottom:12px">Sign in with Google</button>
    <button id="local-mode-btn" class="btn" style="width:100%;background:var(--s2);border:1px solid var(--brd);color:var(--mut);padding:12px;font-size:14px">Continue without sync</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div style="padding:18px 16px 14px;border-bottom:1px solid var(--brd)">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">Habit Tracker</div>
      <div id="sync-status" style="font-size:11px;color:var(--mut);display:flex;align-items:center;gap:4px">Local only</div>
    </div>
    <nav style="flex:1;padding:10px">
      <button class="nav-item active" data-tab="today" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--mut);margin-bottom:2px;transition:all .15s;width:100%;background:none;border:none;font-family:inherit;text-align:left;">
        <span>◷</span>Today
      </button>
    </nav>
    <div style="padding:10px 14px 20px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:7px">
      <button id="sb-settings-btn" class="btn" style="width:100%;padding:9px;background:var(--s2);border:1px solid var(--brd);color:var(--mut);font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px">⚙ Settings</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar"><div id="tb-title" style="font-size:24px;font-weight:700">Today</div></div>
    <div id="content"></div>
  </div>
</div>

<div id="overlay"><div class="dialog" id="dlg"></div></div>

<script>
// Theme definitions
const THEMES={
  dark:{name:'Current Dark',bg:'#080A0F',sur:'#10131A',s2:'#171B25',brd:'#1E2235',txt:'#DDE1EF',mut:'#4A4E65',acc:'#8FA3D8',suc:'#6BA38A',dan:'#C0534A',wrn:'#C4A26A'},
  light:{name:'Light Mode',bg:'#F5F5F5',sur:'#FFFFFF',s2:'#F0F0F0',brd:'#E0E0E0',txt:'#333333',mut:'#888888',acc:'#5B3DB8',suc:'#2E9E6E',dan:'#D32F2F',wrn:'#F57C00'},
  vibrant:{name:'Vibrant Dark',bg:'#0D0D0D',sur:'#1A1A1A',s2:'#1A1A1A',brd:'#0088FF',txt:'#00D9FF',mut:'#0088FF',acc:'#00D9FF',suc:'#00FF88',dan:'#FF00FF',wrn:'#FF9F00'},
  sunset:{name:'Warm Sunset',bg:'#1A1410',sur:'#2D1F15',s2:'#2D1F15',brd:'#3D2A1F',txt:'#FFD4A3',mut:'#C9956C',acc:'#FF9F43',suc:'#EE5A6F',dan:'#FF6B6B',wrn:'#FFA500'}
};

let currentThemeName='dark';

function applyTheme(name){
  const theme=THEMES[name];
  if(!theme)return;
  document.documentElement.style.setProperty('--bg',theme.bg);
  document.documentElement.style.setProperty('--sur',theme.sur);
  document.documentElement.style.setProperty('--s2',theme.s2);
  document.documentElement.style.setProperty('--brd',theme.brd);
  document.documentElement.style.setProperty('--txt',theme.txt);
  document.documentElement.style.setProperty('--mut',theme.mut);
  document.documentElement.style.setProperty('--acc',theme.acc);
  document.documentElement.style.setProperty('--suc',theme.suc);
  document.documentElement.style.setProperty('--dan',theme.dan);
  document.documentElement.style.setProperty('--wrn',theme.wrn);
  currentThemeName=name;
}

function cycleTheme(){
  const names=Object.keys(THEMES);
  const idx=names.indexOf(currentThemeName);
  const next=names[(idx+1)%names.length];
  applyTheme(next);
  localStorage.setItem('ht_theme',next);
}

// Load and apply theme
const saved=localStorage.getItem('ht_theme')||'dark';
applyTheme(saved);

// Settings
function showSettings(){
  const themeNames=Object.keys(THEMES);
  const themeOptions=themeNames.map(name=>`<button onclick="changeTheme('${name}')" style="width:100%;padding:10px;margin-bottom:8px;background:${currentThemeName===name?THEMES[name].acc:'var(--s2)'};border:1px solid var(--brd);border-radius:10px;color:${currentThemeName===name?'#000':THEMES[name].txt};cursor:pointer;font-weight:${currentThemeName===name?'700':'400'};font-family:inherit">${THEMES[name].name}</button>`).join('');
  
  const html=`<div class="dlg-title">⚙ Settings<button class="close-btn" onclick="hideDlg()">×</button></div>
<div style="margin-bottom:20px">
  <label class="form-label">Theme</label>
  ${themeOptions}
</div>`;
  
  document.getElementById('dlg').innerHTML=html;
  document.getElementById('overlay').classList.add('show');
}

function changeTheme(name){
  applyTheme(name);
  localStorage.setItem('ht_theme',name);
  showSettings();
}

function hideDlg(){document.getElementById('overlay').classList.remove('show');}

// Basic rendering
function fullRender(){
  document.getElementById('content').innerHTML=`<div style="padding:40px 20px;text-align:center">
    <div style="font-size:28px;margin-bottom:20px">🎯</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:10px">Welcome to Habit Tracker</div>
    <div style="color:var(--mut);margin-bottom:30px">Add your first habit to get started!</div>
    <button class="btn btn-primary" style="padding:12px 24px">+ Add Habit</button>
  </div>`;
}

// Events
document.getElementById('sb-settings-btn').onclick=showSettings;
document.getElementById('google-signin-btn').onclick=()=>alert('Sign in coming soon!');
document.getElementById('local-mode-btn').onclick=()=>{hideLoginScreen();fullRender();};

function showLoginScreen(){document.getElementById('login-screen').classList.add('show');}
function hideLoginScreen(){document.getElementById('login-screen').classList.remove('show');}

// Init
showLoginScreen();
</script>
</body>
</html>
